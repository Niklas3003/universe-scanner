name: Universe Scanner

on:
  schedule:
    # Every Sunday at 22:00 UTC (11 PM CET / midnight CEST)
    # Runs before Monday's market open so bots have fresh universe
    - cron: "0 22 * * 0"
  workflow_dispatch: # manual trigger anytime

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # scanning thousands of stocks takes time

    # Give Actions permission to write files back to the repo
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run universe scanner
        env:
          ALPACA_KEY:    ${{ secrets.ALPACA_KEY }}
          ALPACA_SECRET: ${{ secrets.ALPACA_SECRET }}
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:   ${{ github.repository }}
        run: node src/scanner.js
